<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard | Money Matrix</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#4b1248,#2c0e3a,#1f0930);
  color:#fff;
  overflow-x:hidden;
}

/* ===== NAVBAR ===== */
.navbar{
  width:100%;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px clamp(20px,5vw,80px);
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:sticky;
  top:0;
  z-index:1000;
}

.nav-logo{
  width:42px;
  height:42px;
  border-radius:14px;
  background:linear-gradient(135deg,#00e5ff,#ffcc00);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:700;
  color:#000;
}

.nav-links{
  display:flex;
  gap:30px;
}

.nav-links a{
  text-decoration:none;
  color:#fff;
  font-weight:500;
  position:relative;
  transition:0.3s;
}

.nav-links a::after{
  content:"";
  position:absolute;
  bottom:-6px;
  left:0;
  width:0;
  height:2px;
  background:linear-gradient(90deg,#00e5ff,#ffcc00);
  transition:0.3s;
}

.nav-links a:hover::after,
.nav-links a.active::after{
  width:100%;
}

.menu-toggle{
  display:none;
  font-size:24px;
  cursor:pointer;
}

@media(max-width:768px){
  .nav-links{
    position:absolute;
    top:70px;
    right:0;
    flex-direction:column;
    background:rgba(30,10,40,0.95);
    width:220px;
    padding:25px;
    gap:20px;
    display:none;
    border-radius:12px 0 0 12px;
  }
  .nav-links.show{display:flex;}
  .menu-toggle{display:block;}
}

/* ===== PAGE TITLE ===== */
h1{
  text-align:center;
  margin:50px 0 40px;
  font-size:clamp(24px,6vw,40px);
  background:linear-gradient(90deg,#00e5ff,#ffcc00);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

/* ===== CARDS ===== */
.cards{
  width:min(95%,1200px);
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:25px;
  margin-bottom:40px;
}

.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(15px);
  padding:30px;
  border-radius:20px;
  text-align:center;
  transition:0.3s;
  border:1px solid rgba(255,255,255,0.08);
}

.card:hover{
  transform:translateY(-8px);
}

.card h3{
  font-size:14px;
  color:#d1c4e9;
  margin-bottom:12px;
}

.card h2{
  font-size:28px;
}

/* ===== CHART ===== */
.chart-section{
  width:min(95%,1200px);
  margin:0 auto 40px;
  background:rgba(255,255,255,0.06);
  padding:40px;
  border-radius:20px;
}

.chart-section canvas{
  max-height:350px;
}

/* ===== INSIGHTS ===== */
.insights{
  width:min(95%,1200px);
  margin:auto;
  background:rgba(255,255,255,0.06);
  padding:30px;
  border-radius:20px;
}

.insights h3{
  margin-bottom:20px;
  color:#ffcc00;
}

.insight-item{
  margin-bottom:12px;
  font-size:14px;
  color:#d1c4e9;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-logo">MM</div>
  <div class="nav-links" id="navLinks">
    <a href="index.html">Home</a>
    <a href="income.html">Income</a>
    <a href="expenses.html">Expenses</a>
    <a href="savings.html">Savings</a>
    <a href="dashboard.html" class="active">Dashboard</a>
  </div>
  <div class="menu-toggle" onclick="toggleMenu()">☰</div>
</div>

<h1>Money Matrix Dashboard</h1>

<div class="cards">
  <div class="card">
    <h3>Total Income</h3>
    <h2 id="totalIncome">₹0</h2>
  </div>

  <div class="card">
    <h3>Total Expenses</h3>
    <h2 id="totalExpenses">₹0</h2>
  </div>

  <div class="card">
    <h3>Remaining Balance</h3>
    <h2 id="remainingBalance">₹0</h2>
  </div>

  <div class="card">
    <h3>Savings Progress</h3>
    <h2 id="savingsProgress">0%</h2>
  </div>
</div>

<div class="chart-section">
  <canvas id="overviewChart"></canvas>
</div>

<div class="insights">
  <h3>Smart Insights</h3>
  <div id="insightList"></div>
</div>

<script>

let chartInstance = null;

function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("show");
}

function loadDashboard(){

  const incomeData = JSON.parse(localStorage.getItem('incomeData')) || [];
  const expenseData = JSON.parse(localStorage.getItem('expenseData')) || [];
  const savingsGoal = parseFloat(localStorage.getItem('savingsGoal')) || 0;

  const totalIncome = incomeData.reduce((sum,i)=>sum+parseFloat(i.amount),0);
  const totalExpenses = expenseData.reduce((sum,e)=>sum+parseFloat(e.amount),0);
  const remaining = totalIncome - totalExpenses;

  document.getElementById("totalIncome").textContent="₹"+totalIncome;
  document.getElementById("totalExpenses").textContent="₹"+totalExpenses;
  document.getElementById("remainingBalance").textContent="₹"+remaining;

  let progress = savingsGoal>0 ? Math.min((remaining/savingsGoal)*100,100).toFixed(1) : 0;
  document.getElementById("savingsProgress").textContent=progress+"%";

  renderChart(totalIncome,totalExpenses,remaining);
  generateInsights(totalIncome,totalExpenses,remaining,savingsGoal);
}

function renderChart(income,expense,balance){

  const ctx=document.getElementById('overviewChart');

  if(chartInstance){
    chartInstance.destroy();
  }

  chartInstance = new Chart(ctx,{
    type:'doughnut',
    data:{
      labels:['Income','Expenses','Balance'],
      datasets:[{
        data:[income,expense,balance],
        backgroundColor:['#00e5ff','#ff4e50','#ffcc00']
      }]
    },
    options:{
      responsive:true,
      plugins:{
        legend:{labels:{color:'#fff'}}
      }
    }
  });
}

function generateInsights(income,expense,balance,goal){

  const list=document.getElementById("insightList");
  list.innerHTML="";

  if(income===0){
    list.innerHTML+=`<div class="insight-item">⚠ You haven't added income yet.</div>`;
  }

  if(expense>income*0.7 && income>0){
    list.innerHTML+=`<div class="insight-item">⚠ You are spending more than 70% of income.</div>`;
  }

  if(balance<0){
    list.innerHTML+=`<div class="insight-item">🚨 Expenses exceed income.</div>`;
  }

  if(goal>0 && balance>=goal){
    list.innerHTML+=`<div class="insight-item">🎉 Savings goal achieved!</div>`;
  }

  if(list.innerHTML===""){
    list.innerHTML=`<div class="insight-item">✅ Financial health looks good.</div>`;
  }
}

loadDashboard();

</script>

</body>
</html>
